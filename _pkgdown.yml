url: https://r-vellum.github.io/vellum/

template:
  bootstrap: 5
  math-rendering: mathjax
  bslib:
    # A parchment / sepia palette echoing the vellum & vellumplot hex logos.
    bg: "#faf5ea"
    fg: "#2c2113"
    primary: "#6b4f2c"
    secondary: "#8a7350"
    border-radius: "0.5rem"
    navbar-bg: "#efe6d2"
    navbar-light-brand-color: "#4a371f"
    link-color: "#7a5320"
    code-bg: "#f2e9d6"
    base_font: {google: "Spectral"}
    heading_font: {google: "Spectral SC"}
    code_font: {google: "JetBrains Mono"}
  includes:
    in_header: |
      <meta name="theme-color" content="#efe6d2">
  opengraph:
    twitter:
      creator: "@schochastics"
      card: summary_large_image

home:
  title: A low-level graphics framework with a Rust backend
  description: >
    vellum is the parchment of the vellum ecosystem: a grid-like scene
    graph, unit/layout engine, and renderer that runs in Rust and draws
    the same scene to PNG, SVG, or PDF. It is the foundation a grammar of
    graphics builds on, not a plotting package itself.
  sidebar:
    structure: [ecosystem, links, license, community, citation, authors, dev]
    components:
      ecosystem:
        title: The ecosystem
        text: >
          [vellum](https://r-vellum.github.io/vellum/) · the parchment
          (backend)<br>
          [vellumplot](https://r-vellum.github.io/vellumplot/) · the pen (grammar)<br>
          [vellumwidget](https://r-vellum.github.io/vellumwidget/) · the annotation (interactivity)<br>
          [vellumverse](https://r-vellum.github.io/vellumverse/) · loads
          them together

navbar:
  structure:
    left: [intro, articles, gallery, reference, news]
    right: [search, vellumplot, vellumwidget, vellumverse, github]
  components:
    gallery:
      text: Gallery
      href: https://r-vellum.github.io/vellumgallery/
    intro:
      text: Get started
      href: articles/vellum.html
    vellumplot:
      icon: fa-feather-pointed
      href: https://r-vellum.github.io/vellumplot/
      aria-label: vellumplot
    vellumwidget:
      icon: fa-highlighter
      href: https://r-vellum.github.io/vellumwidget/
      aria-label: vellumwidget
    vellumverse:
      icon: fa-book
      href: https://r-vellum.github.io/vellumverse/
      aria-label: vellumverse
    github:
      icon: fa-github
      href: https://github.com/r-vellum/vellum
      aria-label: GitHub

articles:
- title: Concepts
  navbar: Concepts
  contents:
  - scene-and-paint
  - retained-mode
  - datashading
- title: Interop
  navbar: Interop
  contents:
  - coming-from-grid
  - grid-interop
- title: The ecosystem contract
  navbar: Contract
  contents:
  - scene-contract

reference:
- title: Building & rendering scenes
  desc: >
    Build a scene functionally with `vl_scene()` and a pipeline of
    `push()` / `draw()` / `pop()`, then render it. `render()` picks the
    backend (PNG / SVG / PDF) from the file extension.
  contents:
  - vl_scene
  - describe
  - display
  - scene_raster
  - scene_svg
  - as_vellum_scene

- title: Graphical objects (grobs)
  desc: >
    The drawable primitives. Most are vectorised and batch internally.
  contents:
  - grob
  - vl_arrow

- title: Units, viewports & layout
  desc: >
    Coordinate systems, nested viewports with scales, clipping and
    rotation, and the row/column layout solver.
  contents:
  - vl_unit
  - vl_viewport
  - grobwidth
  - why_size

- title: Paint & appearance
  desc: >
    The paint model shared across all backends: gradients, tiling
    patterns, masks, reusable styles, and hand-drawn rendering.
  contents:
  - vl_gpar
  - style
  - gradients
  - vl_pattern
  - as_mask
  - sketch

- title: Text
  desc: >
    Device-independent shaping and measurement, plus Markdown-style rich
    labels.
  contents:
  - vl_strwidth
  - md

- title: Big data
  desc: >
    Aggregate-then-shade rendering for large point clouds, dense timeseries, and
    network edges.
  contents:
  - datashade
  - datashade_lines
  - spread

- title: Inspecting & editing scenes
  desc: >
    Because the scene graph is retained, it can be queried, edited by
    node name, hit-tested, and serialized to a per-element model.
  contents:
  - node_names
  - hit_test
  - scene_model

- title: Grid & ggplot2 interop
  desc: >
    Render an existing grid grob tree — including ggplot2 and lattice —
    through the vellum backend.
  contents:
  - as_vellum

- title: Caches & diagnostics
  contents:
  - vl_clear_render_cache

- title: Package
  contents:
  - vellum-package

footer:
  structure:
    left: developed_by
    right: built_with
