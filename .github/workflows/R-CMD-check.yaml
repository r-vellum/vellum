# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# vellum bundles a Rust crate (extendr), so the `setup-rust-toolchain` step
# provides the compiler its backend needs; everything else is the standard
# r-lib R-CMD-check flow.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # Trimmed to a single Linux job to conserve Actions minutes. The full
          # matrix (macOS/Windows + R devel/release/oldrel-1) lived here — macOS
          # bills at 10x, so it was the dominant cost. Restore before release.
          - {os: ubuntu-latest,  r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      # Rust compiler for vellum's backend (SystemRequirements: Cargo, rustc).
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      # R on Windows uses the GNU (UCRT) toolchain, so cargo must target it.
      - name: Add Windows GNU Rust target
        if: runner.os == 'Windows'
        run: rustup target add x86_64-pc-windows-gnu

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
